<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>模型页 · 对味</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="models">
    <div class="page-shell app-shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark">料</span>
          <span>
            <strong>对味 Lifecoach</strong>
            <small>控制台</small>
          </span>
        </a>

        <div class="sidebar-block">
          <div class="sidebar-label">工作台</div>
          <a class="sidebar-link" href="/dashboard">配方台</a>
          <a class="sidebar-link" href="/chat">聊天</a>
          <a class="sidebar-link" href="/keys">钥匙库</a>
          <a class="sidebar-link" href="/integration">接入</a>
          <a class="sidebar-link active" href="/models">模型</a>
        </div>

        <div class="sidebar-cta">
          <button class="sidebar-button" id="logout-button" type="button">退出</button>
        </div>
      </aside>

      <section class="content-shell">
        <header class="content-topbar">
          <div class="search-shell"><span>当前可用能力…</span></div>
          <div class="topbar-actions">
            <div class="theme-switcher">
              <label class="theme-switcher-label" for="theme-select">主题</label>
              <select class="theme-select" id="theme-select" data-theme-select>
                <option value="warm-tea">Warm Tea</option>
                <option value="taisho-nouveau">Taisho Nouveau</option>
                <option value="zine-handmade">Zine Handmade</option>
              </select>
            </div>
          </div>
        </header>

        <main class="page">
          <section class="section-heading">
            <p class="kicker">Models</p>
            <h1>当前可用能力。</h1>
            <p class="lead">只看你现在能用什么。</p>
          </section>

          <section class="card">
            <div class="card-header">
              <h2>模型</h2>
              <button class="button primary" id="load-models" type="button">加载</button>
            </div>
            <div id="models-grid" class="model-grid"></div>
          </section>
        </main>
      </section>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
