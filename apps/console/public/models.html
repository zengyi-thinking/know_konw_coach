<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>模型页 · 对味</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="models">
    <div class="page-shell app-shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark">料</span>
          <span>
            <strong>对味 Lifecoach</strong>
            <small>控制台</small>
          </span>
        </a>

        <div class="sidebar-block">
          <div class="sidebar-label">工作台</div>
          <a class="sidebar-link" href="/dashboard">配方台</a>
          <a class="sidebar-link" href="/chat">聊天</a>
          <a class="sidebar-link" href="/keys">钥匙库</a>
        </div>

        <div class="sidebar-block todo-sidebar-block">
          <div class="sidebar-label">用户画像</div>
          <div class="profile-sidebar-card">
            <div class="profile-sidebar-head">
              <div class="profile-sidebar-avatar">你</div>
              <div class="profile-sidebar-copy">
                <strong id="chat-sidebar-user">正在读取你的当前画像…</strong>
                <p id="chat-sidebar-note">这里会保留教练对你当前主线、状态和最近推进动作的理解。</p>
              </div>
            </div>
            <div class="todo-sidebar-list" id="chat-todo-list">
              <div class="todo-empty-state">进入聊天并生成 To-Do 后，这里会同步显示。</div>
            </div>
          </div>
        </div>

        <div class="sidebar-cta">
          <button class="sidebar-button" id="logout-button" type="button">退出</button>
        </div>
      </aside>

      <section class="content-shell">
        <header class="content-topbar">
          <div class="search-shell"><span>该页面已并入钥匙库统一页面…</span></div>
          <div class="topbar-actions">
            <div class="theme-switcher">
              <label class="theme-switcher-label" for="theme-select">主题</label>
              <select class="theme-select" id="theme-select" data-theme-select>
                <option value="warm-tea">Warm Tea</option>
                <option value="taisho-nouveau">Taisho Nouveau</option>
                <option value="zine-handmade">Zine Handmade</option>
              </select>
            </div>
          </div>
        </header>

        <main class="page">
          <section class="section-heading">
            <p class="kicker">Models Alias</p>
            <h1>模型页已迁移到 /keys。</h1>
            <p class="lead">正在跳转到统一页面的模型区块。</p>
          </section>

          <section class="card">
            <div class="detail-list">
              <div class="detail-row">
                <span>目标地址</span>
                <strong>/keys#models-section</strong>
              </div>
            </div>
            <p class="lead">如果没有自动跳转，可点击 <a class="inline-link" href="/keys#models-section">这里</a>。</p>
          </section>
        </main>
      </section>
    </div>
    <script>
      if (window.location.pathname !== '/keys') {
        window.location.replace('/keys#models-section');
      }
    </script>
    <script src="/app.js"></script>
  </body>
</html>
