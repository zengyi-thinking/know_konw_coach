<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 · 对味 Lifecoach</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="auth">
    <div class="page-shell">
      <header class="topbar topbar-slim">
        <a class="brand" href="/">
          <span class="brand-mark">料</span>
          <span>
            <strong>对味 Lifecoach</strong>
            <small>增强调料控制台</small>
          </span>
        </a>
        <nav class="topnav">
          <a href="/">首页</a>
          <a href="/register">注册</a>
        </nav>
      </header>

      <main class="page split-page">
        <section class="story-panel card">
          <p class="kicker">Sign In</p>
          <h1>回来给小龙虾加味。</h1>
          <p class="lead">
            登录后，你可以重新管理自己的调料包权限、查看用量、再生成新的增强 key，把多模态和小脑火候重新加回去。
          </p>
          <ul class="flavor-list">
            <li>文本版随时可用，不会因为没登录就失去底味。</li>
            <li>增强版通过你的专属 key 激活，不共享别人火候。</li>
            <li>每把 key 都可吊销，像重新封装一包新的调料。</li>
          </ul>
        </section>

        <section class="card auth-card">
          <div class="panel-label">登录开味</div>
          <form id="sign-in-form" class="stack-form">
            <label>邮箱<input name="email" type="email" required></label>
            <label>密码<input name="password" type="password" required></label>
            <button class="button primary wide" type="submit">登录控制台</button>
          </form>
          <div class="helper-note">
            还没有账号？
            <a href="/register">去注册一份新的增强调料</a>
          </div>
          <div class="notice-banner" id="auth-notice">登录后将自动跳转到配方台。</div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
