<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>钥匙库 · 对味</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="keys">
    <div class="page-shell app-shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark">料</span>
          <span>
            <strong>对味 Lifecoach</strong>
            <small>控制台</small>
          </span>
        </a>

        <div class="sidebar-block">
          <div class="sidebar-label">工作台</div>
          <a class="sidebar-link" href="/dashboard">配方台</a>
          <a class="sidebar-link" href="/chat">聊天</a>
          <a class="sidebar-link active" href="/keys">钥匙库</a>
        </div>

        <div class="sidebar-block todo-sidebar-block">
          <div class="sidebar-label">用户画像</div>
          <div class="profile-sidebar-card">
            <div class="profile-sidebar-head">
              <div class="profile-sidebar-avatar">你</div>
              <div class="profile-sidebar-copy">
                <strong id="chat-sidebar-user">正在读取你的当前画像…</strong>
                <p id="chat-sidebar-note">这里会保留教练对你当前主线、状态和最近推进动作的理解。</p>
              </div>
            </div>
            <div class="todo-sidebar-list" id="chat-todo-list">
              <div class="todo-empty-state">进入聊天并生成 To-Do 后，这里会同步显示。</div>
            </div>
          </div>
        </div>

        <div class="sidebar-cta">
          <button class="sidebar-button" id="logout-button" type="button">退出</button>
        </div>
      </aside>

      <section class="content-shell">
        <header class="content-topbar">
          <div class="search-shell"><span>管理你的增强 key…</span></div>
          <div class="topbar-actions">
            <div class="theme-switcher">
              <label class="theme-switcher-label" for="theme-select">主题</label>
              <select class="theme-select" id="theme-select" data-theme-select>
                <option value="warm-tea">Warm Tea</option>
                <option value="taisho-nouveau">Taisho Nouveau</option>
                <option value="zine-handmade">Zine Handmade</option>
              </select>
            </div>
            <a class="button secondary" href="/chat">Open Chat</a>
          </div>
        </header>

        <main class="page">
          <section class="section-heading">
            <p class="kicker">Console Access</p>
            <h1>统一管理钥匙、接入与模型。</h1>
            <p class="lead">一个页面完成 key 管理、OpenClaw 接入配置、可用模型查看。</p>
          </section>

          <section class="card" id="keys-section">
            <div class="card-header">
              <h2>钥匙库</h2>
            </div>
            <form id="create-key-form" class="stack-form inline-create">
              <label>名称<input name="name" type="text" value="OpenClaw Lifecoach Key"></label>
              <button class="button primary" type="submit">生成</button>
            </form>
            <pre id="key-output">创建后只展示一次。</pre>
            <div class="card-header">
              <h3>现有 key</h3>
              <button class="button secondary" id="refresh-keys" type="button">刷新</button>
            </div>
            <div id="keys-list" class="list-grid"></div>
          </section>

          <section class="card" id="integration-section">
            <div class="card-header">
              <h2>接入 OpenClaw</h2>
              <button class="button primary" id="load-snippet" type="button">加载</button>
            </div>
            <pre id="snippet-output">点击按钮后加载。</pre>
            <div id="integration-hint" class="detail-list compact-detail"></div>
          </section>

          <section class="card" id="models-section">
            <div class="card-header">
              <h2>当前可用模型</h2>
              <button class="button primary" id="load-models" type="button">加载</button>
            </div>
            <div id="models-grid" class="model-grid"></div>
          </section>
        </main>
      </section>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
