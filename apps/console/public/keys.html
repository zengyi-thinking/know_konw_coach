<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>钥匙库 · 对味</title>
    <script src="/theme.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="keys">
    <div class="page-shell app-shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark">料</span>
          <span>
            <strong>对味 Lifecoach</strong>
            <small>控制台</small>
          </span>
        </a>

        <div class="sidebar-block">
          <div class="sidebar-label">工作台</div>
          <a class="sidebar-link" href="/dashboard">配方台</a>
          <a class="sidebar-link" href="/chat">聊天</a>
          <a class="sidebar-link active" href="/keys">钥匙库</a>
          <a class="sidebar-link" href="/integration">接入</a>
          <a class="sidebar-link" href="/models">模型</a>
        </div>

        <div class="sidebar-cta">
          <div class="cta-card">
            <p>完整 key 只展示一次，之后只保留前缀和状态。</p>
          </div>
          <button class="sidebar-button" id="logout-button" type="button">退出</button>
        </div>
      </aside>

      <section class="content-shell">
        <header class="content-topbar">
          <div class="search-shell"><span>管理你的增强 key…</span></div>
          <div class="topbar-actions">
            <div class="theme-switcher">
              <label class="theme-switcher-label" for="theme-select">主题</label>
              <select class="theme-select" id="theme-select" data-theme-select>
                <option value="warm-tea">Warm Tea</option>
                <option value="taisho-nouveau">Taisho Nouveau</option>
                <option value="zine-handmade">Zine Handmade</option>
              </select>
            </div>
            <a class="button secondary" href="/chat">Open Chat</a>
          </div>
        </header>

        <main class="page">
          <section class="section-heading">
            <p class="kicker">Keys</p>
            <h1>管理你的增强 key。</h1>
            <p class="lead">创建、查看、吊销。</p>
          </section>

          <section class="card">
            <form id="create-key-form" class="stack-form inline-create">
              <label>名称<input name="name" type="text" value="OpenClaw Lifecoach Key"></label>
              <button class="button primary" type="submit">生成</button>
            </form>
            <pre id="key-output">创建后只展示一次。</pre>
          </section>

          <section class="card">
            <div class="card-header">
              <h2>现有 key</h2>
              <button class="button secondary" id="refresh-keys" type="button">刷新</button>
            </div>
            <div id="keys-list" class="list-grid"></div>
          </section>
        </main>
      </section>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
